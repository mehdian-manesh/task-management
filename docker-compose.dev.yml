services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    volumes:
      - ./backend:/app
      - backend_venv:/app/.venv
    environment:
      - DEBUG=1
      - LANG=C.UTF-8
      - DJANGO_SECRET_KEY=dev_secret_key
      - DJANGO_ALLOWED_HOSTS=localhost,backend
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/taskmanagement
      - TZ=Asia/Tehran
    depends_on:
      - db

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - REACT_APP_BACKEND_URL=https://localhost:${HTTPS_PORT:-443}/api
      - WATCHPACK_POLLING=true
      - BASELINE_BROWSER_MAPPING_IGNORE_OLD_DATA=1
      - BROWSERSLIST_IGNORE_OLD_DATA=1
      - NODE_OPTIONS=--no-warnings --no-deprecation
      - TZ=Asia/Tehran

  caddy:
    image: caddy:2-alpine
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    volumes:
      - ./Caddyfile.dev:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - frontend
      - backend

  db:
    image: postgres:16-alpine
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=taskmanagement
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - TZ=Asia/Tehran

volumes:
  postgres_data:
  caddy_data:
  caddy_config:
  backend_venv: